<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f8faf8; --surface: #ffffff; --surface-hover: #f1f5f1;
  --border: #e2e8e2; --border-light: #eef2ee;
  --text: #1a2e1a; --text-secondary: #5a6e5a; --text-muted: #8a9a8a;
  --green-50: #ecfdf0; --green-100: #d1fae0; --green-200: #a7f3c2;
  --green-500: #22c55e; --green-600: #16a34a; --green-700: #15803d; --green-800: #166534; --green-900: #14532d;
  --red-50: #fef2f2; --red-500: #ef4444; --red-600: #dc2626;
  --amber-50: #fffbeb; --amber-500: #f59e0b; --amber-600: #d97706;
  --blue-50: #eff6ff; --blue-500: #3b82f6; --blue-600: #2563eb;
  --purple-50: #faf5ff; --purple-500: #a855f7; --purple-600: #9333ea;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04); --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 6px rgba(0,0,0,0.05), 0 2px 4px rgba(0,0,0,0.03);
  --radius: 8px; --radius-lg: 12px;
}
body { font-family: 'DM Sans', system-ui, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }
.app { display: flex; min-height: 100vh; }

/* Login Screen */
.login-overlay { position: fixed; inset: 0; background: var(--green-900); display: flex; align-items: center; justify-content: center; z-index: 1000; }
.login-container { width: 100%; max-width: 400px; padding: 32px; }
.login-logo { text-align: center; margin-bottom: 40px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
.login-logo-icon { font-size: 48px; }
.login-logo h1 { color: white; font-size: 28px; font-weight: 700; }
.login-logo p { color: rgba(255,255,255,0.6); font-size: 14px; }
.login-form { display: flex; flex-direction: column; gap: 16px; }
.login-input { width: 100%; padding: 12px 16px; border: 1px solid rgba(255,255,255,0.2); border-radius: var(--radius); font-size: 14px; font-family: inherit; background: rgba(255,255,255,0.05); color: white; transition: all 0.15s; }
.login-input::placeholder { color: rgba(255,255,255,0.4); }
.login-input:focus { outline: none; border-color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.08); }
.login-button { width: 100%; padding: 12px 16px; background: white; color: var(--green-900); border: none; border-radius: var(--radius); font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer; transition: all 0.15s; }
.login-button:hover { background: var(--green-50); }
.login-button:active { transform: scale(0.98); }
.login-forgot { text-align: center; margin-top: 8px; }
.login-forgot a { color: rgba(255,255,255,0.6); text-decoration: none; font-size: 13px; cursor: pointer; transition: color 0.15s; }
.login-forgot a:hover { color: white; }
.login-error { color: var(--red-50); font-size: 13px; padding: 10px 12px; background: rgba(239,68,68,0.1); border-radius: var(--radius); border: 1px solid rgba(239,68,68,0.2); }

/* Sidebar */
.sidebar { width: 260px; background: var(--green-900); color: white; display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 50; }
.sidebar-logo { padding: 24px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); }
.sidebar-logo span { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
.sidebar-logo small { font-size: 11px; opacity: 0.6; font-weight: 400; display: block; margin-top: 2px; }
.sidebar-nav { flex: 1; padding: 16px 12px; display: flex; flex-direction: column; gap: 2px; }
.nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: var(--radius); cursor: pointer; font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.7); transition: all 0.15s; border: none; background: none; width: 100%; text-align: left; }
.nav-item:hover { background: rgba(255,255,255,0.1); color: white; }
.nav-item.active { background: rgba(255,255,255,0.15); color: white; }
.nav-item svg { width: 20px; height: 20px; opacity: 0.8; flex-shrink: 0; }
.nav-badge { margin-left: auto; background: var(--red-500); color: white; font-size: 11px; font-weight: 600; padding: 1px 7px; border-radius: 10px; }
.sidebar-footer { padding: 16px 12px; border-top: 1px solid rgba(255,255,255,0.1); }
.sidebar-user { display: flex; align-items: center; gap: 10px; padding: 8px; }
.sidebar-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--green-600); display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 14px; }
.sidebar-user-info { font-size: 13px; }
.sidebar-user-info div:first-child { font-weight: 600; }
.sidebar-user-info div:last-child { opacity: 0.6; font-size: 12px; }
.logout-button { display: flex; align-items: center; gap: 8px; width: 100%; padding: 10px 12px; border-radius: var(--radius); cursor: pointer; font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.7); transition: all 0.15s; border: none; background: none; text-align: left; margin-top: 12px; }
.logout-button:hover { background: rgba(255,255,255,0.1); color: white; }

/* Main */
.main { margin-left: 260px; flex: 1; min-height: 100vh; }
.topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 40; }
.topbar h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
.topbar-right { display: flex; align-items: center; gap: 12px; }
.topbar-date { font-size: 13px; color: var(--text-muted); }
.content { padding: 28px 32px; }

/* Cards */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); }
.card-header { padding: 20px 24px 0; }
.card-header h3 { font-size: 15px; font-weight: 600; }
.card-header p { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
.card-body { padding: 20px 24px; }

/* KPI Grid */
.kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
.kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px 24px; box-shadow: var(--shadow-sm); }
.kpi-label { font-size: 13px; color: var(--text-muted); font-weight: 500; display: flex; align-items: center; gap: 8px; }
.kpi-label svg { width: 16px; height: 16px; }
.kpi-value { font-size: 28px; font-weight: 700; margin-top: 8px; letter-spacing: -0.5px; }
.kpi-change { font-size: 12px; margin-top: 4px; font-weight: 500; }
.kpi-change.up { color: var(--green-600); }
.kpi-change.down { color: var(--red-500); }
.kpi-change.neutral { color: var(--text-muted); }

/* Charts area */
.charts-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; margin-bottom: 24px; }
.chart-bar-container { display: flex; align-items: flex-end; gap: 8px; height: 180px; padding-top: 10px; }
.chart-bar-group { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.chart-bar { width: 100%; border-radius: 4px 4px 0 0; transition: all 0.3s; min-height: 4px; cursor: pointer; position: relative; }
.chart-bar:hover { opacity: 0.85; }
.chart-bar-label { font-size: 11px; color: var(--text-muted); }
.chart-bar-value { font-size: 10px; font-weight: 600; color: var(--text-secondary); }
.donut-container { display: flex; align-items: center; justify-content: center; gap: 24px; padding: 10px 0; }
.donut-legend { display: flex; flex-direction: column; gap: 8px; }
.donut-legend-item { display: flex; align-items: center; gap: 8px; font-size: 13px; }
.donut-legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

/* Tables */
.table-container { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
thead th { text-align: left; padding: 10px 16px; font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); background: var(--bg); }
tbody td { padding: 12px 16px; font-size: 14px; border-bottom: 1px solid var(--border-light); }
tbody tr:hover { background: var(--surface-hover); }
.badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
.badge-green { background: var(--green-50); color: var(--green-700); }
.badge-red { background: var(--red-50); color: var(--red-600); }
.badge-amber { background: var(--amber-50); color: var(--amber-600); }
.badge-blue { background: var(--blue-50); color: var(--blue-600); }
.badge-purple { background: var(--purple-50); color: var(--purple-600); }

/* Forms */
.form-group { margin-bottom: 20px; }
.form-label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--text-secondary); }
.form-input { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 14px; font-family: inherit; background: var(--surface); color: var(--text); transition: border-color 0.15s; }
.form-input:focus { outline: none; border-color: var(--green-500); box-shadow: 0 0 0 3px var(--green-50); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

/* Buttons */
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 20px; border-radius: var(--radius); font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer; border: 1px solid transparent; transition: all 0.15s; }
.btn-primary { background: var(--green-700); color: white; }
.btn-primary:hover { background: var(--green-800); }
.btn-secondary { background: var(--surface); color: var(--text); border-color: var(--border); }
.btn-secondary:hover { background: var(--surface-hover); }
.btn-danger { background: var(--red-500); color: white; }
.btn-danger:hover { background: var(--red-600); }
.btn-sm { padding: 6px 14px; font-size: 13px; }

/* Search */
.search-bar { display: flex; align-items: center; gap: 8px; padding: 8px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 16px; }
.search-bar input { border: none; background: none; font-size: 14px; font-family: inherit; flex: 1; outline: none; color: var(--text); }
.search-bar svg { width: 18px; height: 18px; color: var(--text-muted); }

/* Settings grid */
.settings-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
.setting-card { background: var(--bg); border: 1px solid var(--border-light); border-radius: var(--radius); padding: 20px; }
.setting-card label { font-size: 13px; font-weight: 600; color: var(--text-secondary); display: block; margin-bottom: 4px; }
.setting-value { font-size: 24px; font-weight: 700; color: var(--green-800); margin: 8px 0; }
.setting-card .form-input { margin-top: 8px; }

/* User detail */
.user-detail-header { display: flex; align-items: center; gap: 20px; margin-bottom: 24px; }
.user-avatar-lg { width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 700; color: white; overflow: hidden; }
.user-avatar-lg img { width: 100%; height: 100%; object-fit: cover; }
.user-detail-info h2 { font-size: 22px; font-weight: 700; }
.user-detail-info p { color: var(--text-muted); font-size: 14px; }
.user-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
.user-stat { background: var(--bg); border-radius: var(--radius); padding: 16px; text-align: center; }
.user-stat-value { font-size: 22px; font-weight: 700; }
.user-stat-label { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 100; }
.modal { background: var(--surface); border-radius: var(--radius-lg); box-shadow: var(--shadow-md); width: 480px; max-width: 90vw; max-height: 85vh; overflow-y: auto; }
.modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.modal-header h3 { font-size: 16px; font-weight: 700; }
.modal-body { padding: 24px; }
.modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }

/* Tabs */
.tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
.tab { padding: 10px 20px; font-size: 14px; font-weight: 500; color: var(--text-muted); cursor: pointer; border: none; background: none; font-family: inherit; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; }
.tab:hover { color: var(--text); }
.tab.active { color: var(--green-700); border-bottom-color: var(--green-700); }

/* Ticket */
.ticket-card { border: 1px solid var(--border-light); border-radius: var(--radius); padding: 16px; margin-bottom: 10px; cursor: pointer; transition: all 0.15s; background: var(--surface); }
.ticket-card:hover { border-color: var(--green-500); box-shadow: var(--shadow-sm); }
.ticket-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.ticket-title { font-weight: 600; font-size: 14px; }
.ticket-meta { font-size: 12px; color: var(--text-muted); }
.ticket-desc { font-size: 13px; color: var(--text-secondary); }

/* Toast */
.toast { position: fixed; bottom: 24px; right: 24px; background: var(--green-800); color: white; padding: 14px 24px; border-radius: var(--radius); box-shadow: var(--shadow-md); font-size: 14px; font-weight: 500; z-index: 200; animation: slideUp 0.3s ease; }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* Loading */
.loading-spinner { display: flex; align-items: center; justify-content: center; padding: 60px; color: var(--text-muted); font-size: 14px; gap: 10px; }
.spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--green-600); border-radius: 50%; animation: spin 0.6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Live indicator */
.live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green-500); display: inline-block; animation: pulse 2s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

/* Responsive */
@media (max-width: 1024px) {
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  .charts-grid { grid-template-columns: 1fr; }
  .settings-grid { grid-template-columns: 1fr; }
  .user-stats { grid-template-columns: repeat(2, 1fr); }
}
</style>

const { useState, useEffect, useCallback, useRef } = React;

// ---- FIREBASE DATA HOOKS ----
function useFirestoreCollection(collectionName, queryFn) {
  const [data, setData] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);

  useEffect(() => {
    let ref = db.collection(collectionName);
    if (queryFn) ref = queryFn(ref);

    const unsub = ref.onSnapshot(
      (snapshot) => {
        const items = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        setData(items);
        setLoading(false);
      },
      (err) => {
        console.error(`Firestore error (${collectionName}):`, err);
        setError(err.message);
        setLoading(false);
      }
    );
    return () => unsub();
  }, [collectionName]);

  return { data, loading, error };
}

// ---- HELPER FUNCTIONS ----
function formatDate(timestamp) {
  if (!timestamp) return '-';
  const d = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
  return d.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' });
}

function formatDateTime(timestamp) {
  if (!timestamp) return '-';
  const d = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
  return d.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function timeAgo(timestamp) {
  if (!timestamp) return '';
  const d = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
  const now = new Date();
  const diff = Math.floor((now - d) / 1000);
  if (diff < 60) return 'gerade eben';
  if (diff < 3600) return `vor ${Math.floor(diff/60)} Min.`;
  if (diff < 86400) return `vor ${Math.floor(diff/3600)} Std.`;
  if (diff < 604800) return `vor ${Math.floor(diff/86400)} Tagen`;
  return formatDate(timestamp);
}

function getUserDisplayName(user) {
  if (!user) return 'Unbekannt';
  if (user.firstName && user.lastName) return `${user.firstName} ${user.lastName}`;
  if (user.firstName) return user.firstName;
  if (user.displayName) return user.displayName;

// ---- SHARED COMPONENTS ----
function LoadingSpinner({ text }) {
  return <div className="loading-spinner"><div className="spinner"></div>{text || 'Laden...'}</div>;
}

function Toast({ message, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  return <div className="toast">{message}</div>;
}

function Modal({ title, onClose, children, footer }) {
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="modal-header">
          <h3>{title}</h3>
          <button className="btn btn-secondary btn-sm" onClick={onClose} style={{padding:'6px'}}>{icons.close}</button>
        </div>
        <div className="modal-body">{children}</div>
        {footer && <div className="modal-footer">{footer}</div>}
      </div>
    </div>
  );
}

function EmptyState({ icon, text }) {
  return <p style={{color:'var(--text-muted)',padding:32,textAlign:'center'}}>{icon} {text}</p>;
}

// ---- LOGIN COMPONENT ----
function LoginScreen({ onLogin }) {
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');

  const handleLogin = (e) => {
    e.preventDefault();
    if (password === DEFAULT_PASSWORD) {
      onLogin();
    } else {
      setError('Passwort ist falsch. Versuche es nochmal.');
      setPassword('');
    }
  };

  return (
    <div className="login-overlay">
      <div className="login-container">
        <div className="login-logo">
          <div className="login-logo-icon">🌱</div>
          <h1>Huckepack</h1>
          <p>Admin Panel</p>
        </div>
        <form className="login-form" onSubmit={handleLogin}>
          <input type="password" className="login-input" placeholder="Passwort eingeben" value={password} onChange={(e) => setPassword(e.target.value)} autoFocus />
          {error && <div className="login-error">{error}</div>}
          <button type="submit" className="login-button">Anmelden</button>
        </form>
      </div>
    </div>
  );
}

// ---- DASHBOARD PAGE (LIVE DATA) ----
function DashboardPage() {
  const { data: users, loading: loadingUsers } = useFirestoreCollection('users');
  const { data: rides, loading: loadingRides } = useFirestoreCollection('rides');
  const { data: payments, loading: loadingPayments } = useFirestoreCollection('payments');

  if (loadingUsers || loadingRides) return <LoadingSpinner text="Dashboard laden..." />;

  const totalUsers = users.length;
  const totalRides = rides.length;
  const activeRides = rides.filter(r => r.status === 'active' || r.status === 'matched').length;
  const completedRides = rides.filter(r => r.status === 'completed' || r.status === 'matched').length;
  const totalCO2 = users.reduce((s, u) => s + (u.co2Saved || 0), 0);
  const totalRevenue = payments.reduce((s, p) => s + (p.platformFee || 0), 0);

  // Rides per day (last 7 days)
  const dayNames = ['So', 'Mo', 'Di', 'Mi', 'Do', 'Fr', 'Sa'];
  const last7Days = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    d.setHours(0, 0, 0, 0);
    const nextD = new Date(d);
    nextD.setDate(nextD.getDate() + 1);
    const count = rides.filter(r => {
      if (!r.createdAt) return false;
      const rd = r.createdAt.toDate ? r.createdAt.toDate() : new Date(r.createdAt);
      return rd >= d && rd < nextD;
    }).length;
    last7Days.push({ day: dayNames[d.getDay()], rides: count, date: d });
  }
  const maxDayRides = Math.max(...last7Days.map(d => d.rides), 1);

  // User mode breakdown
  const drivers = rides.filter(r => r.type === 'offer').map(r => r.userId);
  const riders = rides.filter(r => r.type === 'request').map(r => r.userId);
  const uniqueDrivers = new Set(drivers).size;
  const uniqueRiders = new Set(riders).size;

  const modeData = [
    { label: 'Fahrer', count: uniqueDrivers, color: '#15803d' },
    { label: 'Mitfahrer', count: uniqueRiders, color: '#22c55e' },
  ];
  const totalMode = Math.max(uniqueDrivers + uniqueRiders, 1);

  return (
    <div>
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:20}}>
        <span className="live-dot"></span>
        <span style={{fontSize:13,color:'var(--text-muted)'}}>Live-Daten aus Firebase</span>
      </div>

      <div className="kpi-grid">
        <div className="kpi-card">
          <div className="kpi-label">{icons.users} Registrierte Nutzer</div>
          <div className="kpi-value">{totalUsers}</div>
          <div className="kpi-change neutral">Gesamt</div>
        </div>
        <div className="kpi-card">
          <div className="kpi-label">{icons.car} Fahrten gesamt</div>
          <div className="kpi-value">{totalRides}</div>
          <div className="kpi-change neutral">{activeRides} gerade aktiv</div>
        </div>
        <div className="kpi-card">
          <div className="kpi-label">{icons.euro} Plattform-Marge</div>
          <div className="kpi-value">{totalRevenue.toFixed(2)} EUR</div>
          <div className="kpi-change neutral">aus {payments.length} Zahlungen</div>
        </div>
        <div className="kpi-card">
          <div className="kpi-label">{icons.leaf} CO2 gespart</div>
          <div className="kpi-value">{totalCO2.toFixed(1)} kg</div>
          <div className="kpi-change up">Gesamt seit Start</div>
        </div>
      </div>

      <div className="charts-grid">
        <div className="card">
          <div className="card-header"><h3>Fahrten pro Tag</h3><p>Letzte 7 Tage</p></div>
          <div className="card-body">
            {last7Days.every(d => d.rides === 0) ? (
              <EmptyState text="Noch keine Fahrten in den letzten 7 Tagen" />
            ) : (
              <div className="chart-bar-container">
                {last7Days.map((d, i) => (
                  <div className="chart-bar-group" key={i}>
                    <div className="chart-bar-value">{d.rides}</div>
                    <div className="chart-bar" style={{ height: `${(d.rides / maxDayRides) * 150}px`, background: 'linear-gradient(to top, #15803d, #22c55e)' }} title={`${d.rides} Fahrten`}></div>
                    <div className="chart-bar-label">{d.day}</div>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
        <div className="card">
          <div className="card-header"><h3>Aktive Nutzer</h3><p>{totalUsers} registriert</p></div>
          <div className="card-body">
            <div className="donut-container">
              <svg width="120" height="120" viewBox="0 0 120 120">
                {totalMode > 0 ? (() => {
                  let offset = 0;
                  return modeData.map((d, i) => {
                    const pct = d.count / totalMode;
                    const dash = pct * 283;
                    const gap = 283 - dash;
                    const el = <circle key={i} cx="60" cy="60" r="45" fill="none" stroke={d.color} strokeWidth="20" strokeDasharray={`${dash} ${gap}`} strokeDashoffset={-offset} transform="rotate(-90 60 60)"/>;
                    offset += dash;
                    return el;
                  });
                })() : <circle cx="60" cy="60" r="45" fill="none" stroke="#e2e8e2" strokeWidth="20"/>}
                <text x="60" y="64" textAnchor="middle" fontSize="20" fontWeight="700" fill="#1a2e1a">{totalUsers}</text>
              </svg>
              <div className="donut-legend">
                {modeData.map((d, i) => (
                  <div className="donut-legend-item" key={i}>
                    <div className="donut-legend-dot" style={{ background: d.color }}></div>
                    <span>{d.label}: {d.count}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      </div>

      <div className="card">
        <div className="card-header"><h3>Letzte Fahrten</h3><p>Die neuesten Fahrten in Echtzeit</p></div>
        <div className="card-body" style={{padding:0}}>
          <div className="table-container">
            <table>
              <thead><tr><th>Typ</th><th>Von</th><th>Nach</th><th>Status</th><th>Preis</th><th>Erstellt</th></tr></thead>
              <tbody>
                {rides.length === 0 ? (
                  <tr><td colSpan="6" style={{textAlign:'center',color:'var(--text-muted)',padding:24}}>Noch keine Fahrten</td></tr>
                ) : rides
                  .sort((a, b) => {
                    const da = a.createdAt ? (a.createdAt.toDate ? a.createdAt.toDate() : new Date(a.createdAt)) : new Date(0);
                    const db2 = b.createdAt ? (b.createdAt.toDate ? b.createdAt.toDate() : new Date(b.createdAt)) : new Date(0);
                    return db2 - da;
                  })
                  .slice(0, 10)
                  .map(r => (
                    <tr key={r.id}>
                      <td><span className={`badge ${r.type === 'offer' ? 'badge-green' : 'badge-blue'}`}>{r.type === 'offer' ? 'Angebot' : 'Suche'}</span></td>
                      <td style={{maxWidth:180,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.startAddress || '-'}</td>
                      <td style={{maxWidth:180,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.destAddress || '-'}</td>
                      <td><span className={`badge ${r.status === 'active' ? 'badge-green' : r.status === 'matched' ? 'badge-blue' : r.status === 'cancelled' ? 'badge-red' : r.status === 'expired' ? 'badge-amber' : 'badge-purple'}`}>{r.status || '-'}</span></td>
                      <td>{r.price ? `${r.price.toFixed(2)} EUR` : '-'}</td>
                      <td style={{color:'var(--text-muted)'}}>{timeAgo(r.createdAt)}</td>
                    </tr>
                  ))
                }
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  );
}

// ---- USERS PAGE (LIVE) ----
function UsersPage() {
  const { data: users, loading } = useFirestoreCollection('users');
  const [search, setSearch] = useState('');
  const [selectedUserId, setSelectedUserId] = useState(null);
  const [toast, setToast] = useState(null);
  const [tab, setTab] = useState('alle');

  if (loading) return <LoadingSpinner text="Nutzer laden..." />;

  const filtered = users.filter(u => {
    const name = getUserDisplayName(u).toLowerCase();
    const email = (u.email || '').toLowerCase();
    const phone = (u.phone || '');
    const matchesSearch = name.includes(search.toLowerCase()) || email.includes(search.toLowerCase()) || phone.includes(search);
    if (tab === 'alle') return matchesSearch;
    if (tab === 'gesperrt') return matchesSearch && u.blocked === true;
    return matchesSearch;
  });

  const [confirmDeleteUser, setConfirmDeleteUser] = useState(null);

  const blockUser = async (uid) => {
    try {
      await db.collection('users').doc(uid).update({ blocked: true });
      setToast('Nutzer gesperrt');
    } catch (e) { setToast('Fehler: ' + e.message); }
  };
  const unblockUser = async (uid) => {
    try {
      await db.collection('users').doc(uid).update({ blocked: false });
      setToast('Nutzer entsperrt');
    } catch (e) { setToast('Fehler: ' + e.message); }
  };
  const deleteUser = async (uid) => {
    try {
      // Delete user's rides first
      const userRides = await db.collection('rides').where('userId', '==', uid).get();
      const batch = db.batch();
      userRides.docs.forEach(doc => batch.delete(doc.ref));
      batch.delete(db.collection('users').doc(uid));
      await batch.commit();
      setToast('Nutzer und seine Fahrten gelöscht');
      setSelectedUserId(null);
      setConfirmDeleteUser(null);
    } catch (e) { setToast('Fehler: ' + e.message); }
  };

  if (selectedUserId) {
    const u = users.find(usr => usr.id === selectedUserId);
    if (!u) { setSelectedUserId(null); return null; }
    const displayName = getUserDisplayName(u);
    return (
      <div>
        <button className="btn btn-secondary btn-sm" onClick={() => setSelectedUserId(null)} style={{marginBottom:20}}>{icons.back} Zurueck zur Liste</button>
        <div className="user-detail-header">
          <div className="user-avatar-lg" style={{background: u.blocked ? 'var(--red-500)' : 'var(--green-700)'}}>
            {u.photoURL ? <img src={u.photoURL} alt="" /> : displayName.charAt(0).toUpperCase()}
          </div>
          <div className="user-detail-info">
            <h2>{displayName}</h2>
            <p>{u.email || ''} {u.phone ? ` | ${u.phone}` : ''} {u.createdAt ? ` | Seit ${formatDate(u.createdAt)}` : ''}</p>
          </div>
          <div style={{marginLeft:'auto',display:'flex',gap:8}}>
            {u.blocked ?
              <button className="btn btn-secondary btn-sm" onClick={() => unblockUser(u.id)}>Entsperren</button> :
              <button className="btn btn-danger btn-sm" onClick={() => blockUser(u.id)}>{icons.ban} Sperren</button>
            }
            <button className="btn btn-danger btn-sm" style={{background:'#7f1d1d'}} onClick={() => setConfirmDeleteUser(u.id)}>Löschen</button>
          </div>
        </div>
        <div className="user-stats">
          <div className="user-stat"><div className="user-stat-value">{u.trips || 0}</div><div className="user-stat-label">Fahrten</div></div>
          <div className="user-stat"><div className="user-stat-value" style={{color:'var(--amber-500)'}}>{u.rating ? u.rating.toFixed(1) : '-'}</div><div className="user-stat-label">Bewertung</div></div>
          <div className="user-stat"><div className="user-stat-value" style={{color:'var(--green-600)'}}>{(u.totalEarnings || 0).toFixed(2)} EUR</div><div className="user-stat-label">Einnahmen</div></div>
          <div className="user-stat"><div className="user-stat-value" style={{color:'var(--green-700)'}}>{(u.co2Saved || 0).toFixed(1)} kg</div><div className="user-stat-label">CO2 gespart</div></div>
        </div>
        <div className="card">
          <div className="card-header"><h3>Profil-Details</h3></div>
          <div className="card-body">
            <div className="table-container">
              <table>
                <tbody>
                  <tr><td style={{fontWeight:600,width:200}}>Status</td><td><span className={`badge ${u.blocked ? 'badge-red' : 'badge-green'}`}>{u.blocked ? 'Gesperrt' : 'Aktiv'}</span></td></tr>
                  <tr><td style={{fontWeight:600}}>E-Mail</td><td>{u.email || '-'}</td></tr>
                  <tr><td style={{fontWeight:600}}>Telefon</td><td>{u.phone || '-'}</td></tr>
                  {u.carModel && <tr><td style={{fontWeight:600}}>Auto</td><td>{u.carModel}{u.carColor ? `, ${u.carColor}` : ''}</td></tr>}
                  {u.licensePlate && <tr><td style={{fontWeight:600}}>Kennzeichen</td><td>{u.licensePlate}</td></tr>}
                  <tr><td style={{fontWeight:600}}>Eco-Level</td><td>{u.ecoLevel || 1} ({u.ecoTitle || 'Einsteiger'})</td></tr>
                  <tr><td style={{fontWeight:600}}>Ausgaben gesamt</td><td>{(u.totalCost || 0).toFixed(2)} EUR</td></tr>
                  <tr><td style={{fontWeight:600}}>Registriert</td><td>{formatDateTime(u.createdAt)}</td></tr>
                  <tr><td style={{fontWeight:600}}>Firebase UID</td><td style={{fontSize:12,fontFamily:'monospace',color:'var(--text-muted)'}}>{u.id}</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
        {confirmDeleteUser && (
          <Modal title="Nutzer endgültig löschen?" onClose={() => setConfirmDeleteUser(null)} footer={
            <React.Fragment>
              <button className="btn btn-secondary btn-sm" onClick={() => setConfirmDeleteUser(null)}>Abbrechen</button>
              <button className="btn btn-danger btn-sm" onClick={() => deleteUser(confirmDeleteUser)}>Endgültig löschen</button>
            </React.Fragment>
          }>
            <p style={{marginBottom:8}}>Möchtest du diesen Nutzer wirklich unwiderruflich löschen?</p>
            <p style={{fontSize:13,color:'var(--text-muted)'}}>Alle Fahrten des Nutzers werden ebenfalls gelöscht. Diese Aktion kann nicht rückgängig gemacht werden.</p>
          </Modal>
        )}
        {toast && <Toast message={toast} onClose={() => setToast(null)} />}
      </div>
    );
  }

  const blockedCount = users.filter(u => u.blocked === true).length;

  return (
    <div>
      <div className="tabs">
        <button className={`tab ${tab === 'alle' ? 'active' : ''}`} onClick={() => setTab('alle')}>Alle Nutzer ({users.length})</button>
        <button className={`tab ${tab === 'gesperrt' ? 'active' : ''}`} onClick={() => setTab('gesperrt')}>Gesperrt ({blockedCount})</button>
      </div>
      <div className="search-bar">{icons.search}<input placeholder="Name, E-Mail oder Telefonnummer suchen..." value={search} onChange={e => setSearch(e.target.value)} /></div>
      <div className="card">
        <div className="card-body" style={{padding:0}}>
          <div className="table-container">
            <table>
              <thead><tr><th>Name</th><th>E-Mail</th><th>Status</th><th>Fahrten</th><th>Einnahmen</th><th>CO2</th></tr></thead>
              <tbody>
                {filtered.length === 0 ? (
                  <tr><td colSpan="6" style={{textAlign:'center',color:'var(--text-muted)',padding:24}}>Keine Nutzer gefunden</td></tr>
                ) : filtered.map(u => (
                  <tr key={u.id} onClick={() => setSelectedUserId(u.id)} style={{cursor:'pointer'}}>
                    <td style={{fontWeight:600}}>{getUserDisplayName(u)}</td>
                    <td style={{color:'var(--text-secondary)',fontSize:13}}>{u.email || '-'}</td>
                    <td><span className={`badge ${u.blocked ? 'badge-red' : 'badge-green'}`}>{u.blocked ? 'Gesperrt' : 'Aktiv'}</span></td>
                    <td>{u.trips || 0}</td>

                    <td>{(u.co2Saved || 0).toFixed(1)} kg</td>

          </div>
        </div>
      </div>
      {toast && <Toast message={toast} onClose={() => setToast(null)} />}
    </div>
  );

// ---- PAYMENTS PAGE (NEW - LIVE) ----
function PaymentsPage() {
  const { data: payments, loading } = useFirestoreCollection('payments');
  const { data: users } = useFirestoreCollection('users');
  const [tab, setTab] = useState('alle');

  if (loading) return <LoadingSpinner text="Zahlungen laden..." />;

  const usersMap = {};
  users.forEach(u => { usersMap[u.id] = u; });

  const sorted = [...payments].sort((a, b) => {
    const da = a.createdAt ? (a.createdAt.toDate ? a.createdAt.toDate() : new Date(a.createdAt)) : new Date(0);
    const db2 = b.createdAt ? (b.createdAt.toDate ? b.createdAt.toDate() : new Date(b.createdAt)) : new Date(0);
    return db2 - da;
  });

  const filtered = sorted.filter(p => {
    if (tab === 'alle') return true;
    if (tab === 'completed') return p.status === 'completed';
    if (tab === 'pending') return p.status === 'pending' || p.status === 'stripe_pending';
    return true;
  });

  const totalAmount = payments.filter(p => p.status === 'completed').reduce((s, p) => s + (p.totalAmount || p.amount || 0), 0);
  const totalFees = payments.filter(p => p.status === 'completed').reduce((s, p) => s + (p.platformFee || 0), 0);
  const totalDriverPayouts = payments.filter(p => p.status === 'completed').reduce((s, p) => s + (p.driverAmount || 0), 0);

  return (
    <div>
      <div className="kpi-grid" style={{gridTemplateColumns:'repeat(3,1fr)',marginBottom:24}}>
        <div className="kpi-card">
          <div className="kpi-label">{icons.euro} Gesamtumsatz</div>
          <div className="kpi-value">{totalAmount.toFixed(2)} EUR</div>
          <div className="kpi-change neutral">{payments.length} Transaktionen</div>
        </div>
        <div className="kpi-card">
          <div className="kpi-label">{icons.trend} Plattform-Marge</div>
          <div className="kpi-value" style={{color:'var(--green-700)'}}>{totalFees.toFixed(2)} EUR</div>
          <div className="kpi-change up">2,5% je Seite</div>
        </div>
        <div className="kpi-card">
          <div className="kpi-label">{icons.car} Fahrer-Auszahlungen</div>
          <div className="kpi-value">{totalDriverPayouts.toFixed(2)} EUR</div>
          <div className="kpi-change neutral">Gesamt</div>
        </div>
      </div>

      {/* Monthly Revenue Overview */}
      {(() => {
        const monthlyData = {};
        const monthNames = ['Jan', 'Feb', 'Mär', 'Apr', 'Mai', 'Jun', 'Jul', 'Aug', 'Sep', 'Okt', 'Nov', 'Dez'];
        payments.filter(p => p.status === 'completed').forEach(p => {
          if (!p.createdAt) return;
          const d = p.createdAt.toDate ? p.createdAt.toDate() : new Date(p.createdAt);
          const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
          const label = `${monthNames[d.getMonth()]} ${d.getFullYear()}`;
          if (!monthlyData[key]) monthlyData[key] = { label, revenue: 0, fees: 0, payouts: 0, count: 0 };
          monthlyData[key].revenue += (p.totalAmount || p.amount || 0);
          monthlyData[key].fees += (p.platformFee || 0);
          monthlyData[key].payouts += (p.driverAmount || 0);
          monthlyData[key].count += 1;
        });
        const months = Object.entries(monthlyData).sort((a,b) => b[0].localeCompare(a[0]));
        const maxRevenue = Math.max(...months.map(([,m]) => m.revenue), 1);

        return months.length > 0 ? (
          <div className="card" style={{marginBottom:24}}>

                      <td>{months.reduce((s,[,m])=>s+m.revenue,0).toFixed(2)} EUR</td>
                      <td style={{color:'var(--green-700)'}}>{months.reduce((s,[,m])=>s+m.fees,0).toFixed(2)} EUR</td>
                      <td>{months.reduce((s,[,m])=>s+m.payouts,0).toFixed(2)} EUR</td>

      <div className="tabs">
        <button className={`tab ${tab === 'alle' ? 'active' : ''}`} onClick={() => setTab('alle')}>Alle ({payments.length})</button>
        <button className={`tab ${tab === 'completed' ? 'active' : ''}`} onClick={() => setTab('completed')}>Abgeschlossen ({payments.filter(p=>p.status==='completed').length})</button>
        <button className={`tab ${tab === 'pending' ? 'active' : ''}`} onClick={() => setTab('pending')}>Ausstehend ({payments.filter(p=>p.status==='pending'||p.status==='stripe_pending').length})</button>

      <div className="card">
        <div className="card-body" style={{padding:0}}>
          <div className="table-container">

// ---- RIDES PAGE (NEW - LIVE) ----
function RidesPage() {
  const { data: rides, loading } = useFirestoreCollection('rides');
  const { data: users } = useFirestoreCollection('users');
  const [tab, setTab] = useState('alle');
  const [search, setSearch] = useState('');
  const [toast, setToast] = useState(null);
  const [confirmDelete, setConfirmDelete] = useState(null);
  const [showCleanup, setShowCleanup] = useState(false);
  const [cleanupDays, setCleanupDays] = useState(30);
  const [deleting, setDeleting] = useState(false);

  const deleteRide = async (rideId) => {
    try {
      await db.collection('rides').doc(rideId).delete();
      setToast('Fahrt gelöscht');
      setConfirmDelete(null);
    } catch (e) { setToast('Fehler: ' + e.message); }
  };

  const cleanupOldRides = async () => {
    setDeleting(true);
    try {
      const cutoff = new Date();
      cutoff.setDate(cutoff.getDate() - cleanupDays);
      const cutoffTimestamp = firebase.firestore.Timestamp.fromDate(cutoff);
      const oldRides = rides.filter(r => {
        if (r.status === 'active' || r.status === 'matched') return false;
        if (!r.createdAt) return true;
        const d = r.createdAt.toDate ? r.createdAt.toDate() : new Date(r.createdAt);
        return d < cutoff;
      });
      const batch = db.batch();
      oldRides.forEach(r => batch.delete(db.collection('rides').doc(r.id)));
      await batch.commit();
      setToast(`${oldRides.length} alte Fahrten gelöscht`);
      setShowCleanup(false);
    } catch (e) { setToast('Fehler: ' + e.message); }
    setDeleting(false);
  };

  if (loading) return <LoadingSpinner text="Fahrten laden..." />;

  const usersMap = {};
  users.forEach(u => { usersMap[u.id] = u; });

  const sorted = [...rides].sort((a, b) => {
    const da = a.createdAt ? (a.createdAt.toDate ? a.createdAt.toDate() : new Date(a.createdAt)) : new Date(0);
    const db2 = b.createdAt ? (b.createdAt.toDate ? b.createdAt.toDate() : new Date(b.createdAt)) : new Date(0);
    return db2 - da;
  });

  const filtered = sorted.filter(r => {
    const matchesSearch = !search ||
      (r.startAddress || '').toLowerCase().includes(search.toLowerCase()) ||
      (r.destAddress || '').toLowerCase().includes(search.toLowerCase());
    if (tab === 'alle') return matchesSearch;
    if (tab === 'active') return matchesSearch && r.status === 'active';
    if (tab === 'matched') return matchesSearch && r.status === 'matched';
    if (tab === 'expired') return matchesSearch && (r.status === 'expired' || r.status === 'cancelled');
    return matchesSearch;
  });

  const activeCount = rides.filter(r => r.status === 'active').length;
  const matchedCount = rides.filter(r => r.status === 'matched').length;

  return (
    <div>
      <div className="kpi-grid" style={{gridTemplateColumns:'repeat(4,1fr)',marginBottom:24}}>
        <div className="kpi-card">
          <div className="kpi-label">{icons.car} Fahrten gesamt</div>
          <div className="kpi-value">{rides.length}</div>
        </div>
        <div className="kpi-card">
          <div className="kpi-label" style={{color:'var(--green-600)'}}>Aktiv</div>
          <div className="kpi-value" style={{color:'var(--green-600)'}}>{activeCount}</div>
        </div>
        <div className="kpi-card">
          <div className="kpi-label" style={{color:'var(--blue-600)'}}>Gematcht</div>
          <div className="kpi-value" style={{color:'var(--blue-600)'}}>{matchedCount}</div>
        </div>
        <div className="kpi-card">
          <div className="kpi-label">Angebote vs. Suchen</div>
          <div className="kpi-value" style={{fontSize:22}}>{rides.filter(r=>r.type==='offer').length} / {rides.filter(r=>r.type==='request').length}</div>
        </div>
      </div>

      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <div className="tabs" style={{marginBottom:0}}>
          <button className={`tab ${tab === 'alle' ? 'active' : ''}`} onClick={() => setTab('alle')}>Alle ({rides.length})</button>
          <button className={`tab ${tab === 'active' ? 'active' : ''}`} onClick={() => setTab('active')}>Aktiv ({activeCount})</button>
          <button className={`tab ${tab === 'matched' ? 'active' : ''}`} onClick={() => setTab('matched')}>Gematcht ({matchedCount})</button>
          <button className={`tab ${tab === 'expired' ? 'active' : ''}`} onClick={() => setTab('expired')}>Beendet</button>
        </div>
        <button className="btn btn-danger btn-sm" onClick={() => setShowCleanup(true)}>Alte Fahrten aufräumen</button>
      </div>
      <div className="search-bar">{icons.search}<input placeholder="Adresse suchen..." value={search} onChange={e => setSearch(e.target.value)} /></div>

      <div className="card">
        <div className="card-body" style={{padding:0}}>
          <div className="table-container">
            <table>
              <thead><tr><th>Typ</th><th>Nutzer</th><th>Start</th><th>Ziel</th><th>Distanz</th><th>Preis</th><th>Status</th><th>Erstellt</th><th>Aktion</th></tr></thead>
              <tbody>
                {filtered.length === 0 ? (
                  <tr><td colSpan="9" style={{textAlign:'center',color:'var(--text-muted)',padding:24}}>Keine Fahrten gefunden</td></tr>
                ) : filtered.slice(0, 50).map(r => {
                  const user = usersMap[r.userId];
                  return (
                    <tr key={r.id}>
                      <td><span className={`badge ${r.type === 'offer' ? 'badge-green' : 'badge-blue'}`}>{r.type === 'offer' ? 'Angebot' : 'Suche'}</span></td>
                      <td style={{fontWeight:500}}>{user ? getUserDisplayName(user) : (r.userId || '-').substring(0,8)+'...'}</td>
                      <td style={{maxWidth:150,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontSize:13}}>{r.startAddress || '-'}</td>
                      <td style={{maxWidth:150,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontSize:13}}>{r.destAddress || '-'}</td>
                      <td>{r.distance ? `${r.distance.toFixed(1)} km` : '-'}</td>
                      <td>{r.price ? `${r.price.toFixed(2)} EUR` : '-'}</td>
                      <td><span className={`badge ${r.status === 'active' ? 'badge-green' : r.status === 'matched' ? 'badge-blue' : r.status === 'cancelled' ? 'badge-red' : r.status === 'expired' ? 'badge-amber' : 'badge-purple'}`}>{r.status || '-'}</span></td>
                      <td style={{color:'var(--text-muted)',fontSize:13}}>{timeAgo(r.createdAt)}</td>
                      <td><button className="btn btn-danger btn-sm" style={{padding:'4px 10px',fontSize:12}} onClick={(e) => { e.stopPropagation(); setConfirmDelete(r.id); }}>Löschen</button></td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      </div>

      {confirmDelete && (
        <Modal title="Fahrt löschen?" onClose={() => setConfirmDelete(null)} footer={
          <React.Fragment>
            <button className="btn btn-secondary btn-sm" onClick={() => setConfirmDelete(null)}>Abbrechen</button>
            <button className="btn btn-danger btn-sm" onClick={() => deleteRide(confirmDelete)}>Endgültig löschen</button>
          </React.Fragment>
        }>
          <p>Möchtest du diese Fahrt wirklich unwiderruflich löschen?</p>
        </Modal>
      )}

      {showCleanup && (
        <Modal title="Alte Fahrten aufräumen" onClose={() => setShowCleanup(false)} footer={
          <React.Fragment>
            <button className="btn btn-secondary btn-sm" onClick={() => setShowCleanup(false)}>Abbrechen</button>
            <button className="btn btn-danger btn-sm" onClick={cleanupOldRides} disabled={deleting}>
              {deleting ? 'Lösche...' : `Alte Fahrten löschen`}
            </button>
          </React.Fragment>
        }>
          <p style={{marginBottom:16}}>Lösche alle abgelaufenen und abgebrochenen Fahrten, die älter sind als:</p>
          <div className="form-group">
            <label className="form-label">Älter als (Tage)</label>
            <input className="form-input" type="number" min="1" max="365" value={cleanupDays} onChange={e => setCleanupDays(parseInt(e.target.value) || 30)} />
          </div>
          <p style={{fontSize:13,color:'var(--text-muted)'}}>
            Betrifft {rides.filter(r => {
              if (r.status === 'active' || r.status === 'matched') return false;
              if (!r.createdAt) return true;
              const d = r.createdAt.toDate ? r.createdAt.toDate() : new Date(r.createdAt);
              const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - cleanupDays);
              return d < cutoff;
            }).length} Fahrten. Aktive und gematchte Fahrten werden nicht gelöscht.
          </p>
        </Modal>
      )}

      {toast && <Toast message={toast} onClose={() => setToast(null)} />}
    </div>
  );
}

// ---- SETTINGS PAGE ----
function SettingsPage() {
  const [settings, setSettings] = useState(null);
  const [loading, setLoading] = useState(true);
  const [toast, setToast] = useState(null);

  // Default settings
  const defaults = {
    minPrice: 0.50,
    pricePerKmBase: 0.20,
    pricePerKmAbove: 0.10,
    tierThreshold: 10,
    maxPrice: 5.00,
    cancelFee: 0.50,
    platformFeeTotal: 5,
    platformFeeRider: 2.5,
    platformFeeDriver: 2.5,
    pickupRadiusM: 300,
    destinationRadiusM: 350,
  };

  useEffect(() => {
    db.collection('settings').doc('pricing').get().then(doc => {
      if (doc.exists) {
        setSettings({ ...defaults, ...doc.data() });
      } else {
        setSettings(defaults);
      }
      setLoading(false);
    }).catch(() => {
      setSettings(defaults);
      setLoading(false);
    });
  }, []);

  if (loading || !settings) return <LoadingSpinner text="Einstellungen laden..." />;

  const update = (key, val) => setSettings(prev => ({...prev, [key]: val}));

  const save = async () => {
    try {
      await db.collection('settings').doc('pricing').set(settings, { merge: true });
      setToast('Einstellungen in Firebase gespeichert!');
    } catch (e) {
      setToast('Fehler beim Speichern: ' + e.message);
    }
  };

  // Tiered price calculation
  function calculateTieredPrice(distanceKm) {
    if (distanceKm <= 0) return settings.minPrice;
    let price;
    if (distanceKm <= settings.tierThreshold) {
      price = distanceKm * settings.pricePerKmBase;
    } else {
      price = settings.tierThreshold * settings.pricePerKmBase + (distanceKm - settings.tierThreshold) * settings.pricePerKmAbove;
    }
    return Math.min(Math.max(price, settings.minPrice), settings.maxPrice);
  }

  const ex1Km = 3.5;
  const ex1Price = calculateTieredPrice(ex1Km);
  const ex1Rider = parseFloat((ex1Price * (1 + settings.platformFeeRider / 100)).toFixed(2));
  const ex1Margin = parseFloat((ex1Price * (settings.platformFeeTotal / 100)).toFixed(2));
  const ex1Payout = parseFloat((ex1Price * (1 - settings.platformFeeDriver / 100)).toFixed(2));

  const ex2Km = 14;
  const ex2Price = calculateTieredPrice(ex2Km);
  const ex2Rider = parseFloat((ex2Price * (1 + settings.platformFeeRider / 100)).toFixed(2));
  const ex2Margin = parseFloat((ex2Price * (settings.platformFeeTotal / 100)).toFixed(2));
  const ex2Payout = parseFloat((ex2Price * (1 - settings.platformFeeDriver / 100)).toFixed(2));

  return (
    <div>
      <div className="settings-grid" style={{marginBottom:24}}>
        <div className="setting-card">
          <label>Mindestpreis pro Fahrt</label>
          <div className="setting-value">{settings.minPrice.toFixed(2)} EUR</div>
          <input className="form-input" type="number" step="0.05" min="0" value={settings.minPrice} onChange={e => update('minPrice', parseFloat(e.target.value) || 0)} />
        </div>
        <div className="setting-card">
          <label>Preis pro km (erste {settings.tierThreshold} km)</label>
          <div className="setting-value">{settings.pricePerKmBase.toFixed(2)} EUR</div>
          <input className="form-input" type="number" step="0.01" min="0.01" value={settings.pricePerKmBase} onChange={e => update('pricePerKmBase', parseFloat(e.target.value) || 0)} />
        </div>
        <div className="setting-card">
          <label>Preis pro km (ab {settings.tierThreshold} km)</label>
          <div className="setting-value">{settings.pricePerKmAbove.toFixed(2)} EUR</div>
          <input className="form-input" type="number" step="0.01" min="0.01" value={settings.pricePerKmAbove} onChange={e => update('pricePerKmAbove', parseFloat(e.target.value) || 0)} />
        </div>
        <div className="setting-card">
          <label>Schwelle fuer Staffelpreis</label>
          <div className="setting-value">{settings.tierThreshold} km</div>
          <input className="form-input" type="number" step="1" min="1" value={settings.tierThreshold} onChange={e => update('tierThreshold', parseInt(e.target.value) || 10)} />
        </div>
        <div className="setting-card">
          <label>Plattformgebuehr gesamt</label>
          <div className="setting-value">{settings.platformFeeTotal}%</div>
          <input className="form-input" type="number" step="0.5" min="0" max="50" value={settings.platformFeeTotal} onChange={e => { const v=parseFloat(e.target.value)||0; update('platformFeeTotal',v); update('platformFeeRider',parseFloat((v/2).toFixed(2))); update('platformFeeDriver',parseFloat((v/2).toFixed(2))); }} />
          <small style={{color:'var(--text-muted)',fontSize:11}}>Wird automatisch haelftig aufgeteilt</small>
        </div>
        <div className="setting-card">
          <label>Aufschlag Mitfahrer (+)</label>
          <div className="setting-value">+{settings.platformFeeRider}%</div>
          <input className="form-input" type="number" step="0.5" min="0" max="50" value={settings.platformFeeRider} onChange={e => update('platformFeeRider', parseFloat(e.target.value)||0)} />
        </div>
        <div className="setting-card">
          <label>Abzug Fahrer (-)</label>
          <div className="setting-value">-{settings.platformFeeDriver}%</div>
          <input className="form-input" type="number" step="0.5" min="0" max="50" value={settings.platformFeeDriver} onChange={e => update('platformFeeDriver', parseFloat(e.target.value)||0)} />
        </div>
        <div className="setting-card">
          <label>Matching: Pickup-Radius</label>
          <div className="setting-value">{settings.pickupRadiusM} m</div>
          <input className="form-input" type="number" step="10" min="50" max="2000" value={settings.pickupRadiusM} onChange={e => update('pickupRadiusM', parseInt(e.target.value)||300)} />
        </div>
        <div className="setting-card">
          <label>Matching: Ziel-Radius</label>
          <div className="setting-value">{settings.destinationRadiusM} m</div>
          <input className="form-input" type="number" step="10" min="50" max="2000" value={settings.destinationRadiusM} onChange={e => update('destinationRadiusM', parseInt(e.target.value)||350)} />
        </div>
        <div className="setting-card">
          <label>Hoechstpreis</label>
          <div className="setting-value">{settings.maxPrice.toFixed(2)} EUR</div>
          <input className="form-input" type="number" step="0.50" min="0" value={settings.maxPrice} onChange={e => update('maxPrice', parseFloat(e.target.value) || 0)} />
        </div>
        <div className="setting-card">
          <label>Stornierungsgebuehr</label>
          <div className="setting-value">{settings.cancelFee.toFixed(2)} EUR</div>
          <input className="form-input" type="number" step="0.10" min="0" value={settings.cancelFee} onChange={e => update('cancelFee', parseFloat(e.target.value) || 0)} />
        </div>
      </div>

      <div className="card" style={{marginBottom:24}}>
        <div className="card-header"><h3>Beispielrechnung</h3><p>Tiered Pricing Modell</p></div>
        <div className="card-body">
          <div className="table-container">
            <table>
              <thead><tr><th>Kurzstrecke ({ex1Km} km)</th><th>Langstrecke ({ex2Km} km)</th></tr></thead>
              <tbody>
                <tr><td style={{fontWeight:600}}>Fahrpreis</td><td style={{fontWeight:600}}>Fahrpreis</td></tr>
                <tr><td>{ex1Price.toFixed(2)} EUR</td><td>{ex2Price.toFixed(2)} EUR</td></tr>
                <tr><td style={{color:'var(--green-700)',fontWeight:600,paddingTop:12}}>Plattformgebuehr ({settings.platformFeeTotal}%)</td><td style={{color:'var(--green-700)',fontWeight:600,paddingTop:12}}>Plattformgebuehr ({settings.platformFeeTotal}%)</td></tr>
                <tr><td style={{color:'var(--green-700)',fontWeight:600}}>{ex1Margin.toFixed(2)} EUR</td><td style={{color:'var(--green-700)',fontWeight:600}}>{ex2Margin.toFixed(2)} EUR</td></tr>
                <tr><td style={{paddingTop:12}}>Preis Mitfahrer: {ex1Rider.toFixed(2)} EUR</td><td style={{paddingTop:12}}>Preis Mitfahrer: {ex2Rider.toFixed(2)} EUR</td></tr>
                <tr><td>Auszahlung Fahrer: {ex1Payout.toFixed(2)} EUR</td><td>Auszahlung Fahrer: {ex2Payout.toFixed(2)} EUR</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <button className="btn btn-primary" onClick={save}>Einstellungen in Firebase speichern</button>
      {toast && <Toast message={toast} onClose={() => setToast(null)} />}
    </div>
  );
}

// ---- AREAS PAGE ----
function AreasPage() {
  const [areas, setAreas] = useState([]);
  const [loading, setLoading] = useState(true);
  const [toast, setToast] = useState(null);
  const [showAdd, setShowAdd] = useState(false);
  const [newArea, setNewArea] = useState({ name: '', radius: 12, center: '' });

  useEffect(() => {
    const unsub = db.collection('areas').onSnapshot(snap => {
      const items = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      if (items.length === 0) {
        // Seed default Munich area if none exist
        setAreas([{ id: 'default', name: 'Muenchen Innenstadt', radius: 12, center: 'Marienplatz', active: true }]);
      } else {
        setAreas(items);
      }
      setLoading(false);
    }, () => {
      setAreas([{ id: 'default', name: 'Muenchen Innenstadt', radius: 12, center: 'Marienplatz', active: true }]);
      setLoading(false);
    });
    return () => unsub();
  }, []);

  if (loading) return <LoadingSpinner text="Gebiete laden..." />;

  const toggleArea = async (id) => {
    const area = areas.find(a => a.id === id);
    if (!area || id === 'default') {
      setToast('Gebiet aktualisiert (lokal)');
      setAreas(prev => prev.map(a => a.id === id ? {...a, active: !a.active} : a));
      return;
    }
    try {
      await db.collection('areas').doc(id).update({ active: !area.active });
      setToast('Gebiet aktualisiert');
    } catch (e) { setToast('Fehler: ' + e.message); }
  };

  const addArea = async () => {
    if (!newArea.name || !newArea.center) return;
    try {
      await db.collection('areas').add({ ...newArea, active: true, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
      setNewArea({ name: '', radius: 12, center: '' });
      setShowAdd(false);
      setToast('Neues Gebiet hinzugefuegt');
    } catch (e) { setToast('Fehler: ' + e.message); }
  };

  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <p style={{color:'var(--text-secondary)',fontSize:14}}>Verwalte die Gebiete, in denen Huckepack aktiv ist.</p>
        <button className="btn btn-primary btn-sm" onClick={() => setShowAdd(true)}>+ Gebiet hinzufuegen</button>
      </div>
      <div className="card">
        <div className="card-body" style={{padding:0}}>
          <div className="table-container">
            <table>
              <thead><tr><th>Gebiet</th><th>Zentrum</th><th>Radius</th><th>Status</th><th>Aktion</th></tr></thead>
              <tbody>
                {areas.map(a => (
                  <tr key={a.id}>
                    <td style={{fontWeight:600}}>{a.name}</td>
                    <td>{a.center}</td>
                    <td>{a.radius} km</td>
                    <td><span className={`badge ${a.active ? 'badge-green' : 'badge-red'}`}>{a.active ? 'Aktiv' : 'Inaktiv'}</span></td>
                    <td><button className={`btn btn-sm ${a.active ? 'btn-secondary' : 'btn-primary'}`} onClick={() => toggleArea(a.id)}>{a.active ? 'Deaktivieren' : 'Aktivieren'}</button></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      </div>
      {showAdd && (
        <Modal title="Neues Gebiet" onClose={() => setShowAdd(false)} footer={
          <React.Fragment><button className="btn btn-secondary btn-sm" onClick={() => setShowAdd(false)}>Abbrechen</button><button className="btn btn-primary btn-sm" onClick={addArea}>Hinzufuegen</button></React.Fragment>
        }>
          <div className="form-group"><label className="form-label">Name</label><input className="form-input" placeholder="z.B. Muenchen Ost" value={newArea.name} onChange={e => setNewArea({...newArea, name: e.target.value})} /></div>
          <div className="form-group"><label className="form-label">Zentrum (Adresse)</label><input className="form-input" placeholder="z.B. Ostbahnhof" value={newArea.center} onChange={e => setNewArea({...newArea, center: e.target.value})} /></div>
          <div className="form-group"><label className="form-label">Radius (km)</label><input className="form-input" type="number" min="1" max="50" value={newArea.radius} onChange={e => setNewArea({...newArea, radius: parseInt(e.target.value) || 12})} /></div>
        </Modal>
      )}
      {toast && <Toast message={toast} onClose={() => setToast(null)} />}
    </div>
  );
}

// ---- APP ----
const PAGES = {
  dashboard: { label: 'Dashboard', icon: 'dashboard', component: DashboardPage },
  users: { label: 'Nutzer', icon: 'users', component: UsersPage },
  rides: { label: 'Fahrten', icon: 'car', component: RidesPage },
  payments: { label: 'Zahlungen', icon: 'payments', component: PaymentsPage },
  settings: { label: 'Preise & Marge', icon: 'settings', component: SettingsPage },
  areas: { label: 'Gebiete', icon: 'map', component: AreasPage },
};

function App() {
  const [isLoggedIn, setIsLoggedIn] = useState(false);
  const [page, setPage] = useState('dashboard');

  if (!isLoggedIn) {
    return <LoginScreen onLogin={() => setIsLoggedIn(true)} />;
  }

  const PageComponent = PAGES[page].component;
  const today = new Date().toLocaleDateString('de-DE', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

  return (
    <div className="app">
      <aside className="sidebar">
        <div className="sidebar-logo">
          <span style={{fontSize:28}}>🌱</span>
          <div><span>Huckepack</span><small>Admin Panel v2</small></div>
        </div>
        <nav className="sidebar-nav">
          {Object.entries(PAGES).map(([key, p]) => (
            <button key={key} className={`nav-item ${page === key ? 'active' : ''}`} onClick={() => setPage(key)}>
              {icons[p.icon]} {p.label}
            </button>
          ))}
        </nav>
        <div className="sidebar-footer">
          <div className="sidebar-user">
            <div className="sidebar-avatar">P</div>
            <div className="sidebar-user-info"><div>Paul Hoeser</div><div>Administrator</div></div>
          </div>
          <button className="logout-button" onClick={() => setIsLoggedIn(false)}>
            {icons.logout} Abmelden
          </button>
        </div>
      </aside>
      <main className="main">
        <header className="topbar">
          <h1>{PAGES[page].label}</h1>
          <div className="topbar-right">
            <span className="live-dot"></span>
            <span className="topbar-date">{today}</span>
          </div>
        </header>
        <div className="content"><PageComponent /></div>
      </main>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
